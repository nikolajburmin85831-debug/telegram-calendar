spring:
  config:
    activate:
      on-profile: smoke

assistant:
  clarification:
    max-invalid-attempts: ${APP_CLARIFICATION_MAX_INVALID_ATTEMPTS:2}

  household:
    enabled: ${HOUSEHOLD_NOTIFICATIONS_ENABLED:false}

  gemini:
    mode: real
    fallback-to-stub-on-error: true

  google-calendar:
    mode: real
    enabled: true

  telegram:
    mode: real
    polling:
      enabled: true
    notification:
      enabled: true

  persistence:
    mode: jdbc
    audit-mode: jdbc

logging:
  level:
    root: INFO
    io.github.nadya.assistant: DEBUG
